# ChuyenTinOJ — Judge0 CE configuration
# Adapted from the official Judge0 example config.
# Do NOT commit secrets in production — for local single-user use only.

# Postgres
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=chuyentin_local_dev

# Redis
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=

# Auth (disabled for local single-user use)
AUTHN_HEADER=
AUTHN_TOKEN=
AUTHZ_HEADER=
AUTHZ_TOKEN=

# Submission limits
MAX_QUEUE_SIZE=200
MAX_SUBMISSION_BATCH_SIZE=10
SUBMISSION_CACHE_DURATION=1
USE_DOCS_AS_HOMEPAGE=false
ALLOW_ENABLE_NETWORK=false
ALLOW_ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ALLOW_ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false

# Default resource limits (overridable per submission)
CPU_TIME_LIMIT=5
CPU_TIME_LIMIT_MAX=15
CPU_EXTRA_TIME=1
CPU_EXTRA_TIME_MAX=2
WALL_TIME_LIMIT=10
WALL_TIME_LIMIT_MAX=20
MEMORY_LIMIT=256000
MEMORY_LIMIT_MAX=512000
STACK_LIMIT=64000
STACK_LIMIT_MAX=128000
MAX_PROCESSES_AND_OR_THREADS=60
MAX_PROCESSES_AND_OR_THREADS_MAX=120
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
MAX_NUMBER_OF_RUNS=1
NUMBER_OF_WORKERS=2
INTERVAL=0.1
