version: "3.8"

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "5"

services:
  server:
    image: judge0/judge0:1.13.0
    container_name: chuyentin_judge0_server
    restart: always
    ports:
      - "2358:2358"
    privileged: true
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      - db
      - redis
    <<: *default-logging

  workers:
    image: judge0/judge0:1.13.0
    container_name: chuyentin_judge0_workers
    command: ["./scripts/workers"]
    restart: always
    privileged: true
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      - db
      - redis
    <<: *default-logging

  db:
    image: postgres:16.2
    container_name: chuyentin_judge0_db
    env_file: ./judge0.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    restart: always
    <<: *default-logging

  redis:
    image: redis:7.2.4
    container_name: chuyentin_judge0_redis
    command: ["bash", "-c", "docker-entrypoint.sh --appendonly no"]
    env_file: ./judge0.conf
    volumes:
      - redis-data:/data
    restart: always
    <<: *default-logging

volumes:
  postgres-data:
  redis-data:
